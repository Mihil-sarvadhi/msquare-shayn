<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.10.0/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
</head>
<body>
<div id="root" style="padding:20px">Loading...</div>
<script type="text/babel">
const {LineChart,Line,XAxis,YAxis,ResponsiveContainer}=Recharts;
const data=[{x:'Jan',v:100},{x:'Feb',v:120},{x:'Mar',v:110}];
function App(){
  return(
    <div style={{fontFamily:'sans-serif',background:'#FDFAF4',padding:24}}>
      <h1 style={{color:'#B8860B'}}>SHAYN Test</h1>
      <div style={{height:200}}>
        <ResponsiveContainer width="100%" height="100%">
          <LineChart data={data}>
            <XAxis dataKey="x"/>
            <YAxis/>
            <Line type="monotone" dataKey="v" stroke="#B8860B"/>
          </LineChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
